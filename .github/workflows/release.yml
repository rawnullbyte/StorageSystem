name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: version
        shell: bash
        run: |
          CURRENT=$(cat VERSION)
          echo "Current version: $CURRENT"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if echo "$COMMIT_MSG" | grep -qi "#major"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP="major"
          elif echo "$COMMIT_MSG" | grep -qi "#minor"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.new }}" > VERSION

      - name: Update Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.new }}\"/" backend/Cargo.toml

      - name: Update package.json version
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.new }}\"/" dashboard/package.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION backend/Cargo.toml dashboard/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"

  build-backend:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust toolchain (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard (for embedding in binary)
        run: |
          npm ci
          npm run build
        working-directory: dashboard

      - name: cargo build --release
        run: cargo build --release --manifest-path backend/Cargo.toml

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: storage-backend-x86_64-linux
          path: backend/target/release/storage-backend
          retention-days: 1

  build-android:
    needs: version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle wrapper distribution
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: storage-android-apk-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 1

  release:
    needs: [version, build-backend, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES="Initial release of StorageSystem v${VERSION}."
          else
            NOTES=$(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | head -50 || echo "No recent changes.")
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: storage-backend-x86_64-linux
          path: artifacts/

      - name: Rename backend binary for release
        shell: bash
        run: |
          # download-artifact preserves the original filename from the upload path,
          # which is 'storage-backend'. Rename to include platform info.
          mv artifacts/storage-backend artifacts/storage-backend-x86_64-linux

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: storage-android-apk-debug
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.version.outputs.new_version }}"
          tag_name: "v${{ needs.version.outputs.new_version }}"
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            artifacts/storage-backend-x86_64-linux
            artifacts/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
