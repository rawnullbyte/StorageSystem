name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: version
        shell: bash
        run: |
          CURRENT=$(cat VERSION)
          echo "Current version: $CURRENT"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Parse semver components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if echo "$COMMIT_MSG" | grep -qi "#major"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP="major"
          elif echo "$COMMIT_MSG" | grep -qi "#minor"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW (bump: $BUMP)"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.new }}" > VERSION

      - name: Update Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.new }}\"/" backend/Cargo.toml

      - name: Update package.json version
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.new }}\"/" dashboard/package.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION backend/Cargo.toml dashboard/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES="Initial release of StorageSystem v${{ steps.version.outputs.new }}."
          else
            NOTES=$(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | head -50 || echo "No recent changes.")
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.new }}"
          tag_name: "v${{ steps.version.outputs.new }}"
          body: ${{ steps.release_notes.outputs.notes }}
          token: ${{ secrets.GITHUB_TOKEN }}
