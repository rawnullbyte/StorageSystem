name: Backend CI

on:
  push:
    branches: [main, '**']
    paths:
      - 'backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: cargo check
        run: cargo check --manifest-path backend/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path backend/Cargo.toml -- -D warnings

      - name: cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --manifest-path backend/Cargo.toml
        env:
          DATABASE_URL: postgres://storage:storage_pass@localhost:5432/inventory_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: storage_pass
          POSTGRES_USER: storage
          POSTGRES_DB: inventory_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
