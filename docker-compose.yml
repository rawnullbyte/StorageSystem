version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: storage
      POSTGRES_PASSWORD: storage_pass
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://storage:storage_pass@db:5432/inventory
      HOST: 0.0.0.0
      PORT: "8000"
      RUST_LOG: info
    ports:
      - "8000:8000"

volumes:
  pgdata:
